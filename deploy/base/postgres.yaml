apiVersion: v1
kind: Secret
metadata:
  name: traintrack-postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: traintrack-dev-password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traintrack-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traintrack-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traintrack-postgres
  template:
    metadata:
      labels:
        app: traintrack-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: traintrack
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: traintrack-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: traintrack-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: traintrack-postgres
spec:
  selector:
    app: traintrack-postgres
  ports:
    - port: 5432
      targetPort: 5432